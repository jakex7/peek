name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Gradle checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Run checks
        run: ./gradlew testDebugUnitTest assembleDebug
